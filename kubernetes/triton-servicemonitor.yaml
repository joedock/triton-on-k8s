# NOT APPLIED on this GMP-based GKE cluster.
# Retained as the cloud-portable alternative for clusters running
# kube-prometheus-stack (EKS, AKS, bare-metal, or non-managed GKE).
# See ARCHITECTURE.md §3.7 for the decision rationale.
#
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: triton-metrics
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: triton
  namespaceSelector:
    matchNames:
      - triton
  endpoints:
    - port: metrics
      interval: 15s
      path: /metrics
