apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: triton-metrics
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: triton
  namespaceSelector:
    matchNames:
      - triton
  endpoints:
    - port: metrics
      interval: 15s
      path: /metrics
